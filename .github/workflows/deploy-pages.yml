name: Deploy to GitHub Pages

# Statische Site (reines HTML/CSS/JS, kein Build) direkt aus dem Repo-Root
# nach GitHub Pages deployen.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte, die das Pages-Deployment benötigt
permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deployment gleichzeitig; laufende nicht abbrechen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact (gesamtes Repo-Root als statische Site)
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
